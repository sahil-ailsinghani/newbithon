<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MediTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="signin.css">
</head>

<body>

<div class="bg-scene">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="bg-dots"></div>
</div>


<div class="card">


<div class="card-body">

<!-- BRAND -->
<div class="brand">


<div class="brand-text">
<div class="brand-name">MediTrack</div>
<div class="brand-tagline">Medication Adherence & Dose Error Tracking</div>



</div>
</div>


<!-- TABS -->
<div class="tabs">
<button class="tab-btn active" data-tab="login">Login</button>
<button class="tab-btn" data-tab="signup">Sign Up</button>
</div>


<!-- LOGIN PANEL -->
<div class="panel active" id="login">

<div class="panel-heading">
<div class="panel-title">Welcome back</div>
<div class="panel-sub">Sign in to continue</div>
</div>

<div class="field">
<label>Email</label>
<div class="input-row">
<input type="email" placeholder="Enter email">
</div>
</div>

<div class="field">
<label>Password</label>
<div class="input-row">
<input type="password" placeholder="Enter password" id="loginPassword">
<button class="pw-toggle" onclick="togglePassword('loginPassword')">👁</button>
</div>
</div>

<div class="row-inline">
<label class="remember-label">
<input type="checkbox">
<span>Remember me</span>
</label>

<a href="#" class="forgot-link">Forgot password?</a>
</div>

<button class="btn-primary">Login</button>

<div class="divider">or continue with</div>

<div class="social-row">
<button class="btn-social">Google</button>
<button class="btn-social">GitHub</button>
</div>

<div class="footnote">
Don't have an account? <a href="#">Create one</a>
</div>

</div>



<!-- SIGNUP PANEL -->
<div class="panel" id="signup">

<div class="panel-heading">
<div class="panel-title">Create account</div>
<div class="panel-sub">Join our platform</div>
</div>

<div class="field">
<label>Full Name</label>
<div class="input-row">
<input type="text" placeholder="John Doe">
</div>
</div>

<div class="field">
<label>Email</label>
<div class="input-row">
<input type="email" placeholder="john@email.com">
</div>
</div>

<div class="field">
<label>Password</label>
<div class="input-row">
<input type="password" id="signupPassword" placeholder="Create password">
<button class="pw-toggle" onclick="togglePassword('signupPassword')">👁</button>
</div>



<div class="strength-hint">Use strong password</div>

</div>

<div class="terms-row">
<input type="checkbox">
<label>I agree to the <a href="#">Terms</a> and <a href="#">Privacy</a></label>
</div>

<button class="btn-primary">Create Account</button>

</div>

</div>
</div>



<!-- TOAST -->
<div class="toast" id="toast">Success</div>


<script>

/* TAB SWITCH */

const tabs = document.querySelectorAll(".tab-btn")
const panels = document.querySelectorAll(".panel")

tabs.forEach(btn=>{
btn.onclick=()=>{
tabs.forEach(t=>t.classList.remove("active"))
btn.classList.add("active")

panels.forEach(p=>p.classList.remove("active"))
document.getElementById(btn.dataset.tab).classList.add("active")
}
})

/* PASSWORD TOGGLE */

function togglePassword(id){

const input = document.getElementById(id)

if(input.type === "password")
input.type = "text"
else
input.type = "password"

}

</script>

</body>
</html>
